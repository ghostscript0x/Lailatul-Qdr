<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Laylatul Qadr - Your personalized 10-night worship guide for the last ten nights of Ramadan">
    
    <!-- Open Graph / Social Media Preview -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}Laylatul Qadr - The Night of Power{% endblock %}">
    <meta property="og:description" content="Your personalized 10-night worship plan for the last ten nights of Ramadan. AI-powered duas and guidance.">
    <meta property="og:image" content="{{ url_for('static', filename='moon.png', _external=True) }}">
    <meta property="og:url" content="{{ url_for('index', _external=True) }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Laylatul Qadr - The Night of Power">
    <meta name="twitter:description" content="Your personalized 10-night worship plan for Ramadan. AI-powered duas and guidance.">
    <meta name="twitter:image" content="{{ url_for('static', filename='moon.png', _external=True) }}">
    
    <title>{% block title %}Laylatul Qadr - The Night of Power{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='moon.png') }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Scheherazade:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#1A237E',
                        'primary-light': '#303F9F',
                        'primary-dark': '#0D1642',
                        'accent': '#FFD700',
                        'accent-light': '#FFF8E1',
                        'cream': '#FFFDE7',
                    },
                    fontFamily: {
                        'english': ['Poppins', 'Nunito', 'sans-serif'],
                        'arabic': ['Amiri', 'Scheherazade', 'serif'],
                    }
                }
            }
        }
    </script>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="font-english">
    {% block body %}{% endblock %}
    
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
